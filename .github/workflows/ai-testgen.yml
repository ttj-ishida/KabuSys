name: AI Test Generator

on:
  pull_request:
    types: [opened]

permissions:
  contents: write
  pull-requests: write

jobs:
  testgen:

    if: github.event_name == 'pull_request'

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - run: pip install openai

      - name: Generate tests
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
        run: |
          python .github/scripts/ai_testgen.py

      - name: Commit tests
        env:
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          git config user.name "ai-testgen[bot]"
          git config user.email "bot@example.com"
          git add tests/test_generated.py
          git diff --cached --quiet && echo "no changes" && exit 0
          git commit -m "AI generated tests [skip ci]"
          git fetch origin "$HEAD_REF"
          git rebase origin/"$HEAD_REF" || true
          git push --force-with-lease origin HEAD:"$HEAD_REF"
