name: AI Test Generator

on:
  pull_request:
    types: [opened]

permissions:
  contents: write
  pull-requests: write

jobs:
  testgen:

    # フォークPRはGITHUB_TOKENでpush不可のためスキップ
    if: >
      github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.full_name == github.repository

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 2
          persist-credentials: false

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install deps
        run: pip install -c constraints.txt openai

      - name: Generate tests
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL_TEST || 'gpt-4o-mini' }}
        run: |
          python .github/scripts/ai_testgen.py

      - name: Commit tests
        env:
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "ai-testgen[bot]"
          git config user.email "ai-testgen-bot@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}
          git add tests/test_generated.py
          git diff --cached --quiet && echo "no changes" && exit 0
          git commit -m "Add AI generated tests for PR #${{ github.event.pull_request.number }} [skip ci]"
          git push origin HEAD:"$HEAD_REF"
